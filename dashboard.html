<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Threat Dashboard</title>

    <style>

        body{
            background:#061539;
            color:white;
            font-family:Arial;
            margin:0;
            padding:20px;
        }

        h1{
            color:#38bdf8;
        }

        #dashboard{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
            gap:20px;
            margin-top:30px;
        }

        .card{
            background:#0f172a;
            border:1px solid #38bdf8;
            border-radius:10px;
            padding:15px;
        }

        .threat{
            color:red;
            font-size:22px;
            font-weight:bold;
            margin-bottom:10px;
        }

        .info{
            margin-top:8px;
        }

        .label{
            color:#38bdf8;
            font-weight:bold;
        }

    </style>

</head>

<body>

    <h1>AI Threat Detection Dashboard</h1>

    <div id="dashboard"></div>

    <script>

        async function fetchThreats() {

            try {

                const response = await fetch("http://127.0.0.1:8000/threats");

                const data = await response.json();

                console.log(data);

                const dashboard = document.getElementById("dashboard");

                dashboard.innerHTML = "";

                data.slice(0,50).forEach(threat => {

                    dashboard.innerHTML += `

                    <div class="card">

                        <div class="threat">
                            ${threat.threat_type}
                        </div>

                        <div class="info">
                            <span class="label">Source IP:</span>
                            ${threat.src_ip}
                        </div>

                        <div class="info">
                            <span class="label">Destination IP:</span>
                            ${threat.dst_ip}
                        </div>

                        <div class="info">
                            <span class="label">Packet Size:</span>
                            ${threat.packet_size}
                        </div>

                    </div>

                    `;
                });

            }

            catch(error) {

                console.log(error);

            }

        }

        fetchThreats();

        setInterval(fetchThreats,3000);

    </script>

</body>

</html>
